version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cluegrid_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cluegrid
      POSTGRES_USER: cluegrid
      POSTGRES_PASSWORD: cluegrid_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cluegrid"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cluegrid_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
  redis_data:
